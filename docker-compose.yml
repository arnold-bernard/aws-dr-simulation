services:
  db:
    image: postgres:15-alpine
    container_name: dr-db-local
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: testpass123
      POSTGRES_DB: myapp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d myapp"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: dr-app-local
    environment:
      DB_HOST: db
      DB_NAME: myapp
      DB_USER: admin
      DB_PASSWORD: testpass123
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data: